version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: bizlead_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: bizlead_db
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: MongoDB Express for GUI management
  mongo-express:
    image: mongo-express:1.0.0
    container_name: bizlead_mongo_express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongodb
    profiles:
      - gui  # Run with: docker-compose --profile gui up

volumes:
  mongodb_data:
  mongodb_config:

# Usage:
# docker-compose up -d mongodb           # Start MongoDB only
# docker-compose --profile gui up -d     # Start with Mongo Express GUI
# docker-compose down -v                 # Stop and remove volumes
